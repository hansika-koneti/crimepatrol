name: CrimePatrol CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Docker Compose Validation ──────────────────────────────────────────────
  docker-validate:
    name: Docker Compose — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          cd crimepatrol
          docker compose config --quiet

  # ─── Backend Lint + Test ────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: crimepatrol_test
          POSTGRES_USER: crimepatrol
          POSTGRES_PASSWORD: crimepatrol_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      APP_SECRET_KEY: ci-secret-key-for-testing-only-32chars
      DATABASE_URL: postgresql+asyncpg://crimepatrol:crimepatrol_secret@localhost:5432/crimepatrol_test
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: ""
      TOMTOM_API_KEY: ""
      TICKETMASTER_API_KEY: ""
      CITY_ADAPTER: chicago
      CITY_NAME: Chicago

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gdal-bin libgdal-dev

      - name: Install Python dependencies
        working-directory: crimepatrol/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: crimepatrol/backend
        run: ruff check . --output-format=github

      - name: Type check with MyPy
        working-directory: crimepatrol/backend
        run: mypy core domain --ignore-missing-imports
        continue-on-error: true   # Non-blocking for now

      - name: Run tests
        working-directory: crimepatrol/backend
        run: pytest tests/ -v --cov=. --cov-report=xml --tb=short
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: crimepatrol/backend/coverage.xml
        continue-on-error: true

  # ─── Frontend Type-check + Build ────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crimepatrol/frontend/package-lock.json

      - name: Install dependencies
        working-directory: crimepatrol/frontend
        run: npm ci

      - name: Type check
        working-directory: crimepatrol/frontend
        run: npm run type-check

      - name: Lint
        working-directory: crimepatrol/frontend
        run: npm run lint
        continue-on-error: true

      - name: Run frontend tests
        working-directory: crimepatrol/frontend
        run: npm test
        continue-on-error: true

      - name: Build
        working-directory: crimepatrol/frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://crimepatrol-api.onrender.com/api/v1
          VITE_WS_URL: wss://crimepatrol-api.onrender.com/ws
